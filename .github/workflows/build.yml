name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-plugin:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build --workspace=packages/plugin

      - name: Test plugin
        run: npm run test --workspace=packages/plugin

  build-skill:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build skill
        run: npm run build --workspace=packages/skill

      - name: Test skill
        run: npm run test --workspace=packages/skill
