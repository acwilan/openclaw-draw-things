name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Install ClawHub CLI
        run: npm install -g clawhub@latest

      - name: Build all packages
        run: npm run build

      - name: Test all packages
        run: npm run test

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish plugin to npm
        run: npm publish --workspace=packages/plugin --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Login to ClawHub
        run: clawhub login --token ${{ secrets.CLAWHUB_TOKEN }}
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish plugin to ClawHub
        run: cd packages/plugin && clawhub package publish "$(pwd)" --family code-plugin --source-repo acwilan/openclaw-draw-things --source-commit $(git rev-parse HEAD) --name @acwilan/draw-things --version $(node -p "require('./package.json').version")

      - name: Publish skill to ClawHub
        run: cd packages/skill && clawhub skill publish . --source-repo acwilan/openclaw-draw-things --source-commit $(git rev-parse HEAD)
